name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run tests
        run: uv run --extra dev pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check human review approval
        run: |
          if [ ! -f _review/approved.sha ]; then
            echo "::error::No review approval found. See CLAUDE.md or README.md for the review process."
            echo "::error::Run: uv run marimo export html demo/demo.py -o _site/index.html"
            echo "::error::Then: git rev-parse HEAD > _review/approved.sha"
            exit 1
          fi
          APPROVED=$(cat _review/approved.sha | tr -d '[:space:]')
          CURRENT=$(git rev-parse HEAD)
          if [ "$APPROVED" = "$CURRENT" ]; then
            echo "Review approval matches HEAD exactly ($CURRENT)"
            exit 0
          fi
          # Allow the approval commit itself: if the only changes between
          # the approved SHA and HEAD are in _review/, the content is unchanged.
          CHANGED=$(git diff --name-only "$APPROVED" "$CURRENT" -- . ':!_review/' 2>/dev/null || echo "DIFF_FAILED")
          if [ "$CHANGED" = "DIFF_FAILED" ]; then
            echo "::error::Review approval SHA $APPROVED is not a valid commit in this history."
            echo "::error::Re-export the notebook, review locally, and update _review/approved.sha."
            exit 1
          fi
          if [ -z "$CHANGED" ]; then
            echo "Review approval is for $APPROVED; only _review/ files changed since then. OK."
            exit 0
          fi
          echo "::error::Review approval is for $APPROVED but HEAD is $CURRENT."
          echo "::error::Content files changed since approval:"
          echo "$CHANGED" | sed 's/^/::error::  /'
          echo "::error::Re-export the notebook, review locally, and update _review/approved.sha."
          exit 1

      - name: Export notebook
        run: |
          uv run --extra notebook marimo export html \
            demo/demo.py \
            -o _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
