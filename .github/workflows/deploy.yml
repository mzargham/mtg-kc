name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  review-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check human review approval
        run: |
          if [ ! -f _review/approval ]; then
            echo "::error::No review approval found."
            echo "::error::Run: echo 'mzargham $(date -u +%Y-%m-%dT%H:%M:%SZ)' > _review/approval"
            exit 1
          fi
          APPROVER=$(awk '{print $1}' _review/approval)
          TIMESTAMP=$(awk '{print $2}' _review/approval)
          if [ "$APPROVER" != "mzargham" ]; then
            echo "::error::Approval must be from mzargham, got: $APPROVER"
            exit 1
          fi
          # Check approval is less than 10 minutes old
          NOW=$(date -u +%s)
          APPROVED=$(date -u -d "$TIMESTAMP" +%s 2>/dev/null || echo "INVALID")
          if [ "$APPROVED" = "INVALID" ]; then
            echo "::error::Invalid timestamp in _review/approval: $TIMESTAMP"
            exit 1
          fi
          AGE=$(( NOW - APPROVED ))
          if [ "$AGE" -gt 600 ]; then
            echo "::error::Approval is $(( AGE / 60 )) minutes old (max 10). Re-approve."
            exit 1
          fi
          echo "Approved by $APPROVER at $TIMESTAMP ($(( AGE / 60 )) minutes ago)"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run tests
        run: uv run --extra dev pytest tests/ -v

  build:
    needs: [review-gate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Export notebook
        run: |
          uv run --extra notebook marimo export html \
            demo/demo.py \
            -o _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
